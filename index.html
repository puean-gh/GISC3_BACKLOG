<!DOCTYPE html>
<html lang="th">
<head>
    <base target="_top">
    <!-- โหลดไลบรารี Excel, Tailwind CSS และ Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pea: '#74045f',       /* สีม่วงหลัก PEA */
                        peaLight: '#9d2884',  /* สีม่วงอ่อน */
                        peaDark: '#4a023d',   /* สีม่วงเข้ม */
                        peaGold: '#f59e0b',   /* สีทองตัดขอบ */
                        surface: '#ffffff',
                        background: '#f8fafc'
                    },
                    fontFamily: {
                        sans: ['Sarabun', 'sans-serif'],
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                        'hover': '0 15px 30px -5px rgba(116, 4, 95, 0.15)',
                        'jumbo': '0 20px 40px -10px rgba(0, 0, 0, 0.1)',
                        'modal': '0 25px 50px -12px rgba(0, 0, 0, 0.25)',
                    }
                }
            }
        }
    </script>
    
    <style>
        iframe#sandboxFrame { top: 0 !important; }
        #warning { display: none !important; opacity: 0 !important; height: 0 !important; overflow: hidden !important; }
        
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    </style>
</head>
<body class="bg-background text-slate-700 font-sans antialiased selection:bg-pea/20 selection:text-pea overflow-hidden">

<!-- หน้าจอโหลดข้อมูล -->
<div id="loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[2000] hidden flex-col justify-center items-center gap-4 transition-all">
    <div class="relative w-16 h-16">
        <div class="absolute inset-0 border-4 border-slate-100 rounded-full"></div>
        <div class="absolute inset-0 border-4 border-pea border-t-transparent rounded-full animate-spin"></div>
        <div class="absolute inset-0 flex items-center justify-center text-pea animate-pulse">
            <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.381z" clip-rule="evenodd"></path></svg>
        </div>
    </div>
    <div class="font-bold text-pea text-lg tracking-wide">กำลังดึงข้อมูลระบบ PEA...</div>
</div>

<!-- Modal Popup สรุปกราฟวงกลม -->
<div id="summaryModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[3000] hidden items-center justify-center p-4 sm:p-6 transition-opacity duration-300 opacity-0">
    <div id="summaryModalContent" class="bg-white rounded-[2rem] shadow-modal w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden transform transition-all duration-300 scale-95 opacity-0 border-t-8 border-t-pea">
        
        <div class="flex justify-between items-center px-8 py-6 border-b border-slate-100 bg-slate-50/50">
            <div class="flex items-center gap-4">
                <div class="p-3 bg-pea text-white rounded-xl shadow-md">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                </div>
                <div>
                    <h3 class="text-xl font-bold text-slate-800 tracking-wide">วิเคราะห์สัดส่วนข้อมูล กฟภ.</h3>
                    <p id="summaryColInfo" class="text-sm text-slate-500 font-medium mt-1">กำลังคำนวณ...</p>
                </div>
            </div>
            <button onclick="closeSummaryModal()" class="text-slate-400 hover:text-rose-500 hover:bg-rose-50 p-2 rounded-xl transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        
        <div class="p-6 sm:p-8 overflow-y-auto custom-scrollbar flex-1 bg-white" id="summaryModalBody">
            <!-- ข้อมูลจะถูกแทรกที่นี่ผ่าน JS -->
        </div>
        
        <div class="px-8 py-5 border-t border-slate-100 bg-slate-50 flex justify-between items-center">
            <span id="summaryTotalCount" class="font-bold text-pea text-lg">รวมทั้งหมด 0 รายการ</span>
            <button onclick="closeSummaryModal()" class="px-6 py-2.5 bg-pea hover:bg-peaDark text-white font-semibold rounded-xl transition-all shadow-sm">ปิดหน้าต่าง</button>
        </div>
    </div>
</div>

<!-- ================= Layout หลัก (Sidebar + Main Content) ================= -->
<div class="flex h-screen w-full overflow-hidden bg-slate-50">

    <!-- Sidebar ด้านซ้าย -->
    <aside id="sidebar" class="w-64 bg-peaDark flex-shrink-0 flex flex-col shadow-2xl z-20 transition-all duration-300 overflow-hidden">
        <!-- Logo Area -->
        <div class="h-[72px] flex items-center justify-center px-6 bg-pea shadow-md z-10 flex-shrink-0">
            <div class="flex items-center gap-3 w-full">
                <div class="flex items-center justify-center w-10 h-10 rounded-xl bg-white/20 text-white backdrop-blur-sm border border-white/30 shadow-sm flex-shrink-0">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.381z" clip-rule="evenodd"></path></svg>
                </div>
                <div class="flex flex-col overflow-hidden">
                    <h1 class="text-lg font-bold text-white tracking-wide truncate">PEA Center</h1>
                    <p class="text-peaGold text-[10px] font-medium uppercase tracking-widest truncate">Data Management</p>
                </div>
            </div>
        </div>

        <!-- Menu Area -->
        <nav class="flex-1 overflow-y-auto py-4 custom-scrollbar flex flex-col gap-1 px-3 min-w-[256px]">
            <div class="px-3 py-2 text-xs font-semibold text-white/50 uppercase tracking-wider mb-1">เมนูหลัก</div>
            
            <!-- ปุ่ม Dashboard ภาพรวม -->
            <button id="nav-dashboard" onclick="selectMenu('dashboard', '📊 ภาพรวมระบบ (Overview)')" 
                class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left font-medium border-l-4 border-peaGold bg-white/10 text-white shadow-sm">
                <svg class="w-5 h-5 opacity-90 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span class="truncate">ภาพรวมระบบ</span>
            </button>

            <div class="px-3 py-2 text-xs font-semibold text-white/50 uppercase tracking-wider mt-4 mb-1">ระบบงานต่างๆ</div>
            
            <!-- รายชื่อไฟล์ต่างๆ จะถูกดึงมาแสดงที่นี่โดย JS -->
            <div id="dynamicNavLinks" class="flex flex-col gap-1">
                <!-- กำลังโหลดเมนู... -->
                <div class="px-4 py-2 text-sm text-white/40 italic">กำลังโหลด...</div>
            </div>
        </nav>
        
        <!-- Footer ของ Sidebar -->
        <div class="p-4 border-t border-white/10 text-center min-w-[256px]">
            <p class="text-[10px] text-white/40 uppercase tracking-widest">© 2026 PEA Data System</p>
        </div>
    </aside>

    <!-- Content Area ด้านขวา -->
    <div class="flex-1 flex flex-col h-screen overflow-hidden relative bg-slate-50/50">
        
        <!-- Top Header แบบใหม่ -->
        <header class="h-[72px] bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-8 shadow-sm z-10 flex-shrink-0">
            <!-- ปุ่ม Toggle Sidebar และ ชื่อหน้า -->
            <div class="flex items-center gap-2 md:gap-4">
                <button onclick="toggleSidebar()" class="p-2 rounded-xl bg-slate-50 hover:bg-slate-100 text-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-pea/20 border border-slate-100 shadow-sm" title="เปิด/ปิด แถบเมนู">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <div class="h-6 w-px bg-slate-200 mx-1 hidden md:block"></div>
                <h2 id="currentPageTitle" class="text-xl font-bold text-slate-800 m-0 tracking-wide drop-shadow-sm truncate">📊 ภาพรวมระบบ (Overview)</h2>
            </div>
            
            <!-- Action เครื่องมือต่างๆ ด้านขวา -->
            <div class="flex items-center gap-4" id="topActionArea">
                <!-- ช่องค้นหา ย้ายมาอยู่ Header บนขวา -->
                <div class="relative w-[250px] hidden md:block" id="searchContainer">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="w-5 h-5 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <input type="text" id="search" onkeyup="resetAndRender()" 
                        placeholder="ค้นหาข้อมูล..." 
                        class="w-full pl-10 pr-4 py-2 bg-slate-100 border-transparent rounded-xl focus:outline-none focus:ring-2 focus:ring-pea/20 focus:bg-white transition-all text-slate-700 text-sm">
                </div>

                <div class="h-6 w-px bg-slate-200 hidden md:block" id="actionDivider"></div>

                <button id="summaryBtn" onclick="openSummaryModal()" 
                    class="hidden group items-center gap-2 bg-peaGold hover:bg-yellow-500 text-peaDark font-bold py-2 px-4 rounded-xl shadow-sm hover:shadow-md transition-all text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>
                    กราฟวิเคราะห์
                </button>
                
                <button id="exportBtn" onclick="exportToExcel()" 
                    class="hidden group items-center gap-2 bg-[#107c41] hover:bg-[#0c5c30] text-white font-medium py-2 px-4 rounded-xl shadow-sm hover:shadow-md transition-all text-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    Excel
                </button>
                
                <select id="rowSelect" onchange="updateRowsPerPage()" 
                    class="hidden pl-4 pr-8 py-2 bg-white border border-slate-200 rounded-xl text-slate-600 font-medium focus:outline-none cursor-pointer hover:bg-slate-50 appearance-none bg-[url('data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%2224%22%20height%3D%2224%22%20viewBox%3D%220%200%2024%2024%22%20fill%3D%22none%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%222%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%3E%3Cpolyline%20points%3D%226%209%2012%2015%2018%209%22%3E%3C%2Fpolyline%3E%3C%2Fsvg%3E')] bg-[position:calc(100%-10px)_center] bg-no-repeat shadow-sm text-sm">
                    <option value="10">10 แถว</option>
                    <option value="20" selected>20 แถว</option>
                    <option value="30">30 แถว</option>
                    <option value="all">ทั้งหมด</option>
                </select>
            </div>
        </header>

        <!-- Main Workspace (ตรงกลาง) -->
        <main class="flex-1 overflow-y-auto p-6 md:p-8" id="mainArea">
            
            <!-- 1. หน้าต่าง Dashboard (ภาพรวม) -->
            <div id="dashboardView" class="w-full max-w-7xl mx-auto flex flex-col gap-6">
                <div class="flex-1 w-full grid grid-cols-1 md:grid-cols-3 gap-6" id="topCards"></div>
                <div class="flex-1 w-full grid grid-cols-1 md:grid-cols-2 gap-6" id="bottomCards"></div>
            </div>

            <!-- 2. หน้าต่างตารางข้อมูล (TableView) -->
            <div id="tableView" class="hidden h-full flex-col gap-4 max-w-[100vw]">
                <!-- ปุ่มเปลี่ยน Tab Sheet -->
                <div id="tabArea" class="flex flex-wrap gap-2"></div>

                <!-- ตัวตาราง -->
                <div class="bg-white rounded-2xl shadow-soft border border-slate-200 flex flex-col flex-1 overflow-hidden">
                    <div class="flex-1 custom-scrollbar overflow-x-auto overflow-y-auto">
                        <table class="w-full text-sm text-left text-slate-600 border-collapse">
                            <thead id="thead" class="text-xs text-white uppercase bg-peaLight sticky top-0 z-10 border-b border-pea font-semibold tracking-wider shadow-sm">
                            </thead>
                            <tbody id="tbody" class="divide-y divide-slate-100">
                            </tbody>
                        </table>
                    </div>
                    
                    <!-- Pagination Footer ของตาราง -->
                    <div class="flex flex-col md:flex-row justify-between items-center p-4 bg-slate-50 border-t border-slate-200 gap-4" id="paginationArea">
                        <div id="totalItemsInfo" class="text-sm font-medium text-peaDark">กำลังโหลดข้อมูล...</div>
                        
                        <div class="flex items-center gap-3">
                            <button id="prevBtn" onclick="changePage(-1)" 
                                class="flex items-center gap-1 px-4 py-2 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 font-medium rounded-xl disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg> ย้อนกลับ
                            </button>
                            <div class="px-4 py-1.5 bg-pea text-white rounded-lg shadow-inner">
                                <span id="pageInfo" class="font-semibold text-sm">หน้า 1</span>
                            </div>
                            <button id="nextBtn" onclick="changePage(1)" 
                                class="flex items-center gap-1 px-4 py-2 bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 font-medium rounded-xl disabled:opacity-50 disabled:cursor-not-allowed transition-all shadow-sm">
                                ถัดไป <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </main>
    </div>
</div>

<!-- ================= สคริปต์การทำงาน (JS) ================= -->
<script>
    // ฟังก์ชันเปิด/ปิด Sidebar
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        if (sidebar.classList.contains('w-64')) {
            sidebar.classList.remove('w-64');
            sidebar.classList.add('w-0');
        } else {
            sidebar.classList.remove('w-0');
            sidebar.classList.add('w-64');
        }
    }

    function destroyWarning() {
        let warningEl = document.getElementById("warning");
        if (warningEl) warningEl.remove();
    }
    setInterval(destroyWarning, 500);

    let allData = [];
    let filteredData = [];
    let currentPage = 1;
    let rowsPerPage = 20;
    let currentFileId = "";
    let currentSheetName = "";
    let myChartInstance = null; 
    let gFilesData = []; // เก็บตัวแปรรายชื่อไฟล์เอาไว้ทำ Sidebar

    const cardDesign = {
        "BackLog_ADS": { 
            id: "1PKMVSFCgBwU42JRLWflpJa89zG2EtZ0l43FSuDppfhY",
            color: "text-pea", bg: "bg-pea/10", ring: "hover:ring-peaLight/50",
            icon: `<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 9h14"></path><path d="M5 12h14"></path><rect x="7" y="12" width="10" height="9" rx="1"></rect><path d="M9 15v3"></path><path d="M15 15v3"></path><path d="M8 4v5"></path><path d="M16 4v5"></path></svg>`
        },
        "BackLog_ISU": { 
            id: "1zYbB18hl0hJ7kNY4lBSXVF53m0ZtXLE7cYCV4tKc2lI",
            color: "text-peaGold", bg: "bg-amber-100", ring: "hover:ring-peaGold/50",
            icon: `<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="3" width="14" height="18" rx="2"></rect><circle cx="12" cy="10" r="4"></circle><path d="M12 10l1.5 -1.5"></path><rect x="8" y="16" width="8" height="2"></rect></svg>`
        },
        "ค่าผิดปกติ จาก OPSAonGIS": { 
            id: "1PwQbHXBAQlpdWlRS0TiNoIMeDblaDBZd_ZhnqiOxDYk",
            color: "text-rose-500", bg: "bg-rose-100", ring: "hover:ring-rose-400/50",
            icon: `<svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>`
        },
        "Waive มิเตอร์": { 
            id: "1MeYS4aTMpX5S7DE56whS21rPIp7Wa7-KsFm3nu0yd0g",
            color: "text-emerald-600", bg: "bg-emerald-100", ring: "hover:ring-emerald-400/50",
            icon: `<svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>`
        },
        "Waive หม้อแปลง": { 
            id: "1JgzqeXHKB_n5gWZu9hZgcU6RbgckSls3xdM7Nvf6U90",
            color: "text-blue-500", bg: "bg-blue-100", ring: "hover:ring-blue-400/50",
            icon: `<svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z"></path></svg>`
        }
    };

    // ตอนโหลดหน้าเว็บครั้งแรก ดึงรายชื่อไฟล์มาสร้างเป็นปุ่มเมนู Sidebar
    window.onload = function() {
        destroyWarning();
        google.script.run.withSuccessHandler(function(files) {
            gFilesData = files;
            let navHtml = '';
            
            // สร้างปุ่มเมนูตามรายชื่อไฟล์
            files.forEach(f => {
                navHtml += `
                <button id="nav-${f.id}" onclick="selectMenu('${f.id}', '${f.name}')" 
                    class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left font-medium border-l-4 border-transparent text-white/70 hover:bg-white/5 hover:text-white">
                    <svg class="w-5 h-5 opacity-70 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                    <span class="truncate">${f.name}</span>
                </button>`;
            });
            document.getElementById("dynamicNavLinks").innerHTML = navHtml;
            
            // เริ่มต้นที่หน้า Dashboard
            selectMenu('dashboard', '📊 ภาพรวมระบบ (Overview)'); 
        }).getFileList();
    };

    // ฟังก์ชันจัดการคลิกเมนู Sidebar
    function selectMenu(value, titleName) {
        // อัปเดตชื่อบน Header
        document.getElementById("currentPageTitle").innerText = titleName;
        currentFileId = value; // เก็บ ID ที่กำลังเปิดเผื่อเอาไปใช้

        // อัปเดตสไตล์ของปุ่ม (Active State)
        document.querySelectorAll('.nav-item').forEach(el => {
            el.classList.remove('bg-white/10', 'border-peaGold', 'text-white');
            el.classList.add('text-white/70', 'border-transparent');
        });
        let activeEl = document.getElementById('nav-' + value);
        if(activeEl) {
            activeEl.classList.remove('text-white/70', 'border-transparent');
            activeEl.classList.add('bg-white/10', 'border-peaGold', 'text-white');
        }

        // จัดการแสดงผล Content 
        if (value === "dashboard") {
            document.getElementById("tableView").classList.add("hidden");
            document.getElementById("dashboardView").classList.remove("hidden");
            
            // ซ่อนปุ่ม Action บน Header
            document.getElementById("summaryBtn").classList.add("hidden"); 
            document.getElementById("exportBtn").classList.add("hidden");
            document.getElementById("rowSelect").classList.add("hidden");
            document.getElementById("searchContainer").classList.add("hidden");
            document.getElementById("actionDivider").classList.add("hidden");

            // โหลดข้อมูลภาพรวม
            document.getElementById("loading").classList.remove("hidden");
            document.getElementById("loading").classList.add("flex");
            
            google.script.run.withSuccessHandler(function(summaryData) {
                let dataMap = {};
                summaryData.forEach(item => dataMap[item.name] = item);

                function createCardHtml(name, textCls, iconSizeCls) {
                    let item = dataMap[name];
                    if(!item) return '';
                    let design = cardDesign[name];
                    return `
                    <div onclick="clickCard('${design.id}', '${name}')" class="flex flex-col items-center justify-center bg-white rounded-[2rem] shadow-soft hover:shadow-jumbo transition-all duration-300 cursor-pointer border-t-4 border-t-white hover:border-t-pea group hover:ring-2 ${design.ring} w-full h-full p-6 relative overflow-hidden min-h-[220px]">
                        <div class="absolute -right-8 -bottom-8 opacity-[0.03] w-48 h-48 pointer-events-none">${design.icon}</div>
                        <div class="${iconSizeCls} p-3 rounded-2xl ${design.bg} flex items-center justify-center ${design.color} mb-4 transition-transform duration-300 group-hover:scale-110 group-hover:-translate-y-2">
                            ${design.icon}
                        </div>
                        <div class="text-slate-700 font-bold text-center text-xl lg:text-2xl mb-2 tracking-wide z-10">${item.name}</div>
                        <div class="${textCls} font-extrabold ${design.color} tracking-tighter mb-1 drop-shadow-sm leading-none z-10">${item.count}</div>
                        <div class="text-xs lg:text-sm font-semibold text-slate-400 uppercase tracking-widest mt-auto z-10">รายการทั้งหมด</div>
                    </div>`;
                }

                document.getElementById("topCards").innerHTML = 
                    createCardHtml("BackLog_ADS", "text-5xl lg:text-6xl", "w-16 h-16 lg:w-20 lg:h-20") +
                    createCardHtml("BackLog_ISU", "text-5xl lg:text-6xl", "w-16 h-16 lg:w-20 lg:h-20") +
                    createCardHtml("ค่าผิดปกติ จาก OPSAonGIS", "text-5xl lg:text-6xl", "w-16 h-16 lg:w-20 lg:h-20");

                document.getElementById("bottomCards").innerHTML = 
                    createCardHtml("Waive มิเตอร์", "text-[5rem] lg:text-[7rem]", "w-20 h-20 lg:w-24 lg:h-24") +
                    createCardHtml("Waive หม้อแปลง", "text-[5rem] lg:text-[7rem]", "w-20 h-20 lg:w-24 lg:h-24");
                
                document.getElementById("loading").classList.add("hidden");
                document.getElementById("loading").classList.remove("flex");
            }).getDashboardSummary();
            
        } else {
            // โหมดเปิดตาราง
            document.getElementById("dashboardView").classList.add("hidden");
            document.getElementById("tableView").classList.remove("hidden");
            document.getElementById("tableView").classList.add("flex");
            
            // แสดงปุ่ม Action บน Header
            document.getElementById("summaryBtn").classList.remove("hidden");
            document.getElementById("summaryBtn").classList.add("flex");
            document.getElementById("exportBtn").classList.remove("hidden");
            document.getElementById("exportBtn").classList.add("flex");
            document.getElementById("rowSelect").classList.remove("hidden");
            document.getElementById("searchContainer").classList.remove("hidden");
            document.getElementById("actionDivider").classList.remove("hidden");
            
            loadFile(0, value);
        }
    }

    // ฟังก์ชันช่วยกดการ์ดในหน้า Dashboard แล้วส่งต่อให้ Sidebar เปลี่ยนหน้า
    function clickCard(fileId, name) {
        selectMenu(fileId, name);
    }

    function openSummaryModal() {
        if (filteredData.length === 0 || allData.length <= 1) return;

        let headers = allData[0];
        let targetColIndex = -1;

        let expectedColName = "";
        let fileNameToCheck = currentFileId; 
        
        if (fileNameToCheck === "1PKMVSFCgBwU42JRLWflpJa89zG2EtZ0l43FSuDppfhY") {
            expectedColName = "สำนักงาน(ADS)";
        } else if (fileNameToCheck === "1zYbB18hl0hJ7kNY4lBSXVF53m0ZtXLE7cYCV4tKc2lI") {
            if (currentSheetName.includes("20%")) {
                expectedColName = "สำนักงาน";
            } else {
                expectedColName = "สำนักงาน(ISU)";
            }
        } else if (fileNameToCheck === "1MeYS4aTMpX5S7DE56whS21rPIp7Wa7-KsFm3nu0yd0g" || fileNameToCheck === "1JgzqeXHKB_n5gWZu9hZgcU6RbgckSls3xdM7Nvf6U90") {
            expectedColName = "สังกัด กฟฟ.";
        } else if (fileNameToCheck === "1PwQbHXBAQlpdWlRS0TiNoIMeDblaDBZd_ZhnqiOxDYk") {
            expectedColName = "กฟฟ.";
        } else {
            expectedColName = "สำนักงาน";
            if(!headers.includes(expectedColName)) { expectedColName = "กฟฟ."; }
        }

        for (let i = 0; i < headers.length; i++) {
            if (String(headers[i]).trim() === expectedColName) {
                targetColIndex = i;
                break;
            }
        }

        let htmlContent = "";
        
        if (targetColIndex === -1) {
            document.getElementById("summaryColInfo").innerText = `⚠️ ไม่พบชื่อคอลัมน์ "${expectedColName}" ในหน้านี้`;
            htmlContent = `
            <div class="flex flex-col items-center justify-center p-12 text-slate-400">
                <svg class="w-16 h-16 mb-4 opacity-50 text-rose-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                <p class="text-lg font-medium text-slate-500">โปรดตรวจสอบว่าชื่อคอลัมน์ใน Sheet ตรงกับ "${expectedColName}" หรือไม่</p>
            </div>`;
            document.getElementById("summaryTotalCount").innerText = "รวมทั้งหมด 0 รายการ";
            document.getElementById("summaryModalBody").innerHTML = htmlContent;
        } else {
            let colName = headers[targetColIndex];
            document.getElementById("summaryColInfo").innerText = `ดึงข้อมูลจากคอลัมน์: "${colName}"`;
            
            let counts = {};
            let totalValidItems = 0;
            
            filteredData.forEach(row => {
                let officeName = row[targetColIndex];
                if (officeName === undefined || officeName === null) officeName = "";
                officeName = String(officeName).trim();
                
                if (currentFileId === "1PwQbHXBAQlpdWlRS0TiNoIMeDblaDBZd_ZhnqiOxDYk") {
                    if (officeName === "-" || officeName === "") return;
                } else {
                    if(officeName === "-" || officeName === "") officeName = "ไม่ระบุ/ว่างเปล่า";
                }
                
                counts[officeName] = (counts[officeName] || 0) + 1;
                totalValidItems++;
            });

            let sortedOffices = Object.entries(counts).sort((a, b) => b[1] - a[1]);

            let chartLabels = [];
            let chartData = [];
            
            let listHtml = `<div class="flex flex-col gap-3 h-[40vh] md:h-auto md:max-h-[60vh] overflow-y-auto custom-scrollbar pr-2">`;
            const chartColors = ['#74045f', '#f59e0b', '#9d2884', '#0ea5e9', '#10b981', '#f43f5e', '#8b5cf6', '#eab308', '#64748b', '#0f766e', '#be123c', '#4338ca'];

            sortedOffices.forEach(([name, count], idx) => {
                chartLabels.push(name);
                chartData.push(count);

                let rankStyle = "border-slate-100 bg-white hover:bg-slate-50";
                let rankColor = "text-slate-400";
                let badgeColor = chartColors[idx % chartColors.length];
                
                if (name !== "ไม่ระบุ/ว่างเปล่า") {
                    if (idx === 0) rankStyle = "border-pea/30 bg-pea/5 shadow-sm"; 
                    else if (idx === 1) rankStyle = "border-amber-200 bg-amber-50 shadow-sm"; 
                    else if (idx === 2) rankStyle = "border-sky-200 bg-sky-50 shadow-sm"; 
                }

                let rankBadge = name !== "ไม่ระบุ/ว่างเปล่า" 
                    ? `<div class="w-4 h-4 rounded-full mx-auto" style="background-color: ${badgeColor};"></div>` 
                    : `<span class="text-slate-300">➖</span>`;

                listHtml += `
                <div class="flex items-center justify-between p-3 md:p-4 border rounded-2xl transition-colors ${rankStyle}">
                    <div class="flex items-center gap-3 md:gap-4 pr-4">
                        <div class="w-8 flex-shrink-0 text-center">${rankBadge}</div>
                        <div class="font-semibold text-slate-700 text-sm md:text-base leading-snug">${name}</div>
                    </div>
                    <div class="flex-shrink-0 font-bold text-pea bg-white border border-pea/20 px-4 py-1.5 md:px-5 md:py-2 rounded-xl shadow-sm text-base md:text-lg">
                        ${count}
                    </div>
                </div>`;
            });
            listHtml += `</div>`;

            htmlContent = `
            <div class="flex flex-col md:flex-row gap-8 items-center md:items-start w-full">
                <div class="w-full md:w-5/12 flex flex-col items-center justify-center p-4 bg-slate-50 rounded-[2rem] border border-slate-100">
                    <div class="relative w-[220px] h-[220px] lg:w-[280px] lg:h-[280px]">
                        <canvas id="peaDoughnutChart"></canvas>
                    </div>
                    <p class="mt-6 text-sm font-medium text-slate-500 text-center">ยอดรวมทั้งหมด<br><span class="text-3xl font-extrabold text-pea">${totalValidItems.toLocaleString()}</span></p>
                </div>
                <div class="w-full md:w-7/12">
                    ${listHtml}
                </div>
            </div>`;
            
            document.getElementById("summaryTotalCount").innerText = `พบข้อมูลรวม ${totalValidItems.toLocaleString()} รายการ`;
            document.getElementById("summaryModalBody").innerHTML = htmlContent;

            setTimeout(() => {
                let ctx = document.getElementById('peaDoughnutChart').getContext('2d');
                if (myChartInstance) myChartInstance.destroy(); 
                
                myChartInstance = new Chart(ctx, {
                    type: 'doughnut', 
                    data: {
                        labels: chartLabels,
                        datasets: [{
                            data: chartData,
                            backgroundColor: chartColors,
                            borderWidth: 2,
                            borderColor: '#ffffff',
                            hoverOffset: 12
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '70%', 
                        plugins: {
                            legend: { display: false },
                            tooltip: {
                                titleFont: { family: 'Sarabun', size: 14 },
                                bodyFont: { family: 'Sarabun', size: 15, weight: 'bold' },
                                backgroundColor: 'rgba(116, 4, 95, 0.9)',
                                padding: 12,
                                cornerRadius: 8
                            }
                        }
                    }
                });
            }, 50); 
        }
        
        let modal = document.getElementById("summaryModal");
        let modalContent = document.getElementById("summaryModalContent");
        
        modal.classList.remove("hidden");
        modal.classList.add("flex");
        setTimeout(() => {
            modal.classList.remove("opacity-0");
            modalContent.classList.remove("scale-95", "opacity-0");
            modalContent.classList.add("scale-100", "opacity-100");
        }, 10);
    }

    function closeSummaryModal() {
        let modal = document.getElementById("summaryModal");
        let modalContent = document.getElementById("summaryModalContent");
        
        modal.classList.remove("opacity-100");
        modal.classList.add("opacity-0");
        modalContent.classList.remove("scale-100", "opacity-100");
        modalContent.classList.add("scale-95", "opacity-0");
        
        setTimeout(() => {
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }, 300);
    }

    function loadFile(sheetIdx, overrideFileId) {
        document.getElementById("loading").classList.remove("hidden");
        document.getElementById("loading").classList.add("flex");
        currentFileId = overrideFileId || currentFileId;
        
        google.script.run.withSuccessHandler(function(res) {
            allData = res.values;
            currentSheetName = res.currentSheetName;
            
            let tabHtml = "";
            if (res.allSheets.length > 1) {
                let displaySheets = res.allSheets.slice(0, 2);
                displaySheets.forEach((name, idx) => {
                    let activeClass = (idx === sheetIdx) 
                        ? 'bg-pea text-white shadow-md' 
                        : 'bg-white text-slate-600 border border-slate-300 hover:bg-slate-50';
                    tabHtml += `<button class="px-5 py-2 rounded-xl text-sm font-bold transition-all duration-200 ${activeClass}" onclick="loadFile(${idx}, '${currentFileId}')">${name}</button>`;
                });
            }
            document.getElementById("tabArea").innerHTML = tabHtml;

            let headHtml = "<tr>";
            allData[0].forEach(h => headHtml += `<th class="px-5 py-4 whitespace-nowrap">${h}</th>`);
            document.getElementById("thead").innerHTML = headHtml + "</tr>";
            
            document.getElementById("search").value = ""; 
            resetAndRender();
            
            document.getElementById("loading").classList.add("hidden");
            document.getElementById("loading").classList.remove("flex");
        }).getSheetData(currentFileId, sheetIdx);
    }

    function exportToExcel() {
        if (filteredData.length === 0) return;
        let exportData = [allData[0], ...filteredData];
        let wb = XLSX.utils.book_new();
        let ws = XLSX.utils.aoa_to_sheet(exportData);
        XLSX.utils.book_append_sheet(wb, ws, "Data");
        XLSX.writeFile(wb, `รายงานข้อมูลPEA_${new Date().toLocaleDateString()}.xlsx`);
    }

    function updateRowsPerPage() {
        let val = document.getElementById("rowSelect").value;
        if (val === "all") { rowsPerPage = 999999; } else { rowsPerPage = parseInt(val); }
        resetAndRender();
    }

    function resetAndRender() { currentPage = 1; renderTable(); }
    function changePage(step) { currentPage += step; renderTable(); }

    function renderTable() {
        let searchTerm = document.getElementById("search").value.toUpperCase();
        
        let opsaColIndex = -1;
        if (currentFileId === "1PwQbHXBAQlpdWlRS0TiNoIMeDblaDBZd_ZhnqiOxDYk" && allData.length > 0) {
            let headers = allData[0];
            for (let i = 0; i < headers.length; i++) {
                if (String(headers[i]).trim() === "กฟฟ.") {
                    opsaColIndex = i;
                    break;
                }
            }
        }

        filteredData = allData.filter((row, index) => {
            if (index === 0) return false;
            
            if (currentFileId === "1PwQbHXBAQlpdWlRS0TiNoIMeDblaDBZd_ZhnqiOxDYk") {
                let val = opsaColIndex !== -1 ? row[opsaColIndex] : row[0];
                if (val === undefined || val === null) return false;
                let strVal = String(val).trim();
                if (strVal === "" || strVal === "-") return false;
            }

            return row.join(" ").toUpperCase().includes(searchTerm);
        });

        let totalItems = filteredData.length;
        let totalPages = Math.ceil(totalItems / rowsPerPage) || 1;
        let startItem = (currentPage - 1) * rowsPerPage + 1;
        let endItem = Math.min(currentPage * rowsPerPage, totalItems);
        if (totalItems === 0) { startItem = 0; endItem = 0; }

        document.getElementById("totalItemsInfo").innerText = `แสดง ${startItem} ถึง ${endItem} จากทั้งหมด ${totalItems} รายการ`;
        document.getElementById("prevBtn").disabled = (currentPage === 1);
        document.getElementById("nextBtn").disabled = (currentPage === totalPages);
        document.getElementById("pageInfo").innerText = `หน้า ${currentPage} จาก ${totalPages}`;

        let start = (currentPage - 1) * rowsPerPage;
        let pageItems = filteredData.slice(start, start + rowsPerPage);

        let bodyHtml = "";
        pageItems.forEach((row, rowIndex) => {
            bodyHtml += `<tr class="hover:bg-pea/5 transition-colors duration-150 border-b border-slate-100 last:border-b-0">`;
            row.forEach((cell, index) => {
                let cls = "px-5 py-3 whitespace-nowrap";
                let highlight = "";
                
                if (currentFileId === "1PKMVSFCgBwU42JRLWflpJa89zG2EtZ0l43FSuDppfhY") {
                    if(index == 4 || index == 5) highlight = "bg-blue-50/80 text-blue-700 font-medium";
                    if(index == 6 || index == 7) highlight = "bg-amber-50/80 text-amber-700 font-medium";
                    if(index == 8 || index == 9) highlight = "bg-rose-50/80 text-rose-700 font-medium";
                } 
                else if (currentFileId === "1zYbB18hl0hJ7kNY4lBSXVF53m0ZtXLE7cYCV4tKc2lI") {
                    if (currentSheetName.includes("80%")) {
                        if(index == 5 || index == 6) highlight = "bg-blue-50/80 text-blue-700 font-medium";
                        if(index == 7 || index == 8) highlight = "bg-amber-50/80 text-amber-700 font-medium";
                        if(index == 9 || index == 10) highlight = "bg-rose-50/80 text-rose-700 font-medium";
                    } else if (currentSheetName.includes("20%")) {
                        if(index == 6 || index == 7) highlight = "bg-rose-50/80 text-rose-700 font-medium";
                    }
                }
                
                bodyHtml += `<td class="${cls} ${highlight}">${cell}</td>`;
            });
            bodyHtml += "</tr>";
        });
        document.getElementById("tbody").innerHTML = bodyHtml;
    }
</script>
</body>
</html>
