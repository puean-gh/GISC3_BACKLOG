<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GISC3 BACKLOG</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { pea: '#74045f', peaLight: '#9d2884', peaDark: '#4a023d', peaGold: '#f59e0b' },
                    fontFamily: { sans: ['Sarabun', 'sans-serif'] }
                }
            }
        }
    </script>
    <style>
        .custom-scrollbar::-webkit-scrollbar { height: 6px; width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .nav-item.active { background-color: rgba(255,255,255,0.1); border-left: 4px solid #f59e0b; color: white; }
    </style>
</head>
<body class="bg-slate-50 text-slate-700 font-sans antialiased overflow-hidden">

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxQmhndxsR1qZjfy9p_vqFKz0eRoeXV5XpLb5ZF2X0TzmHOe89-qtHxgPdi2gfE7Is/exec";
</script>

<div id="loading" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-[2000] hidden flex flex-col justify-center items-center gap-4 transition-all">
    <div class="w-16 h-16 border-4 border-pea border-t-transparent rounded-full animate-spin"></div>
    <div class="font-bold text-pea text-lg animate-pulse">กำลังดึงข้อมูลจาก Google Sheet .....</div>
</div>

<div id="summaryModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[3000] hidden items-center justify-center p-4 transition-opacity duration-300 opacity-0">
    <div id="summaryModalContent" class="bg-white rounded-[2rem] shadow-2xl w-full max-w-5xl max-h-[90vh] flex flex-col overflow-hidden transform transition-all duration-300 scale-95 opacity-0 border-t-8 border-t-pea">
        <div class="flex justify-between items-center px-8 py-6 border-b bg-slate-50">
            <h3 class="text-xl font-bold text-slate-800">📊 วิเคราะห์สัดส่วนข้อมูล กฟภ.</h3>
            <button onclick="closeSummaryModal()" class="text-slate-400 hover:text-red-500 text-2xl">×</button>
        </div>
        <div class="p-8 overflow-y-auto custom-scrollbar flex-1" id="summaryModalBody"></div>
        <div class="px-8 py-5 border-t bg-slate-50 flex justify-end">
            <button onclick="closeSummaryModal()" class="px-6 py-2 bg-pea text-white rounded-xl">ปิด</button>
        </div>
    </div>
</div>

<div class="flex h-screen w-full overflow-hidden">
    <aside id="sidebar" class="w-64 bg-peaDark flex-shrink-0 flex flex-col shadow-2xl z-20 transition-all duration-300">
        <div class="h-[72px] flex items-center px-6 bg-pea shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-xl bg-white/20 flex items-center justify-center text-white border border-white/30 shadow-sm">
                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M11.3 1.046A1 1 0 0112 2v5h4a1 1 0 01.82 1.573l-7 10A1 1 0 018 18v-5H4a1 1 0 01-.82-1.573l7-10a1 1 0 011.12-.381z"></path></svg>
                </div>
                <div>
                    <h1 class="text-lg font-bold text-white leading-none">GISC3 BACKLOG</h1>
                    <p class="text-[10px] text-peaGold uppercase tracking-widest mt-1">Data Management</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 custom-scrollbar flex flex-col gap-1 px-3">
            <div class="px-3 py-2 text-xs font-semibold text-white/50 uppercase tracking-wider">เมนูหลัก</div>
            <button id="nav-dashboard" onclick="selectMenu('dashboard', '📊 ภาพรวมระบบ')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left text-white/70 hover:bg-white/5">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                <span>ภาพรวมระบบ</span>
            </button>
            <div id="dynamicNavLinks" class="flex flex-col gap-1"></div>
        </nav>
    </aside>

    <div class="flex-1 flex flex-col h-screen overflow-hidden bg-slate-50/50">
        <header class="h-[72px] bg-white border-b flex items-center justify-between px-8 shadow-sm">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 rounded-xl bg-slate-50 hover:bg-slate-100 text-slate-600 border shadow-sm">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                </button>
                <h2 id="currentPageTitle" class="text-xl font-bold text-slate-800 tracking-wide">📊 ภาพรวมระบบ</h2>
            </div>
            <div class="flex items-center gap-4">
                <input type="text" id="search" onkeyup="resetAndRender()" placeholder="ค้นหา..." class="w-64 px-4 py-2 bg-slate-100 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-pea/20">
                <button id="summaryBtn" onclick="openSummaryModal()" class="hidden bg-peaGold text-peaDark font-bold px-4 py-2 rounded-xl text-sm">วิเคราะห์กราฟ</button>
                <button id="exportBtn" onclick="exportToExcel()" class="hidden bg-emerald-600 text-white px-4 py-2 rounded-xl text-sm">Excel</button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-8 custom-scrollbar">
            <div id="dashboardView" class="grid grid-cols-1 md:grid-cols-3 gap-6 max-w-7xl mx-auto">
                <div id="topCards" class="md:col-span-3 grid grid-cols-1 md:grid-cols-3 gap-6"></div>
                <div id="bottomCards" class="md:col-span-3 grid grid-cols-1 md:grid-cols-2 gap-6"></div>
            </div>
            <div id="tableView" class="hidden flex flex-col gap-4">
                <div id="tabArea" class="flex flex-wrap gap-2"></div>
                <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
                    <div class="overflow-x-auto custom-scrollbar">
                        <table class="w-full text-sm text-left">
                            <thead id="thead" class="bg-peaLight text-white sticky top-0"></thead>
                            <tbody id="tbody" class="divide-y divide-slate-100"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>
</div>

<script>
    // Fetch Logic สำหรับ GitHub Pages
    let allData = [], filteredData = [], currentPage = 1, rowsPerPage = 20, currentFileId = "", currentSheetName = "", myChart = null;
    const cardDesign = {
        "BackLog_ADS": { id: "1PKMVSFCgBwU42JRLWflpJa89zG2EtZ0l43FSuDppfhY", color: "text-pea", bg: "bg-pea/10", icon: `<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 9h14M5 12h14"></path><rect x="7" y="12" width="10" height="9" rx="1"></rect></svg>` },
        "BackLog_ISU": { id: "1zYbB18hl0hJ7kNY4lBSXVF53m0ZtXLE7cYCV4tKc2lI", color: "text-peaGold", bg: "bg-amber-100", icon: `<svg class="w-full h-full" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="3" width="14" height="18" rx="2"></rect><circle cx="12" cy="10" r="4"></circle></svg>` },
        "ค่าผิดปกติ จาก OPSAonGIS": { id: "1PwQbHXBAQlpdWlRS0TiNoIMeDblaDBZd_ZhnqiOxDYk", color: "text-rose-500", bg: "bg-rose-100", icon: `<svg class="w-full h-full" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>` },
        "Waive มิเตอร์": { id: "1MeYS4aTMpX5S7DE56whS21rPIp7Wa7-KsFm3nu0yd0g", color: "text-emerald-600", bg: "bg-emerald-100", icon: `<svg class="w-full h-full" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 17v-2m3 2v-4m3 4v-6m2 10H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>` },
        "Waive หม้อแปลง": { id: "1JgzqeXHKB_n5gWZu9hZgcU6RbgckSls3xdM7Nvf6U90", color: "text-blue-500", bg: "bg-blue-100", icon: `<svg class="w-full h-full" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"></path></svg>` }
    };

    window.onload = function() {
        document.getElementById("loading").classList.remove("hidden");
        document.getElementById("loading").classList.add("flex");
        fetch(API_URL + "?action=getFileList").then(r=>r.json()).then(files => {
            let navHtml = '';
            files.forEach(f => {
                navHtml += `<button id="nav-${f.id}" onclick="selectMenu('${f.id}', '${f.name}')" class="nav-item w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-all text-left text-white/70 hover:bg-white/5 border-l-4 border-transparent"><span class="truncate">${f.name}</span></button>`;
            });
            document.getElementById("dynamicNavLinks").innerHTML = navHtml;
            selectMenu('dashboard', '📊 ภาพรวมระบบ'); 
        });
    };

    function selectMenu(value, title) {
        document.getElementById("currentPageTitle").innerText = title;
        currentFileId = value;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active', 'bg-white/10', 'text-white'));
        let activeEl = document.getElementById('nav-' + value);
        if(activeEl) activeEl.classList.add('active', 'bg-white/10', 'text-white');

        if (value === "dashboard") {
            document.getElementById("tableView").classList.add("hidden");
            document.getElementById("dashboardView").classList.remove("hidden");
            document.getElementById("summaryBtn").classList.add("hidden");
            document.getElementById("exportBtn").classList.add("hidden");
            document.getElementById("loading").classList.remove("hidden");
            document.getElementById("loading").classList.add("flex");
            fetch(API_URL + "?action=getDashboardSummary").then(r=>r.json()).then(renderDashboard);
        } else {
            document.getElementById("dashboardView").classList.add("hidden");
            document.getElementById("tableView").classList.remove("hidden");
            document.getElementById("summaryBtn").classList.remove("hidden");
            document.getElementById("exportBtn").classList.remove("hidden");
            loadFile(0, value);
        }
    }

    function renderDashboard(data) {
        let topHtml = "", bottomHtml = "";
        data.forEach(item => {
            let design = cardDesign[item.name];
            let card = `<div onclick="selectMenu('${design.id}', '${item.name}')" class="bg-white p-6 rounded-[2rem] shadow-sm border-t-4 border-pea hover:shadow-lg cursor-pointer transition-all text-center relative overflow-hidden min-h-[200px] flex flex-col justify-center group">
                <div class="absolute -right-4 -bottom-4 w-32 h-32 opacity-5 group-hover:scale-110 transition-transform">${design.icon}</div>
                <div class="w-12 h-12 ${design.bg} ${design.color} p-2 rounded-xl mx-auto mb-4">${design.icon}</div>
                <div class="text-slate-700 font-bold mb-1">${item.name}</div>
                <div class="text-5xl font-black ${design.color}">${item.count}</div>
            </div>`;
            if(["BackLog_ADS", "BackLog_ISU", "ค่าผิดปกติ จาก OPSAonGIS"].includes(item.name)) topHtml += card; else bottomHtml += card;
        });
        document.getElementById("topCards").innerHTML = topHtml;
        document.getElementById("bottomCards").innerHTML = bottomHtml;
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("loading").classList.remove("flex");
    }

    function loadFile(idx, fileId) {
        document.getElementById("loading").classList.remove("hidden");
        document.getElementById("loading").classList.add("flex");
        fetch(`${API_URL}?action=getSheetData&fileId=${fileId}&sheetIndex=${idx}`).then(r=>r.json()).then(res => {
            allData = res.values; currentSheetName = res.currentSheetName;
            let tabHtml = "";
            res.allSheets.forEach((name, i) => {
                let active = (i === idx) ? 'bg-pea text-white shadow-md' : 'bg-white text-slate-500 border';
                tabHtml += `<button onclick="loadFile(${i}, '${fileId}')" class="px-4 py-2 rounded-xl font-bold text-sm ${active}">${name}</button>`;
            });
            document.getElementById("tabArea").innerHTML = tabHtml;
            let headHtml = "<tr>";
            allData[0].forEach(h => headHtml += `<th class="px-6 py-4 whitespace-nowrap font-bold uppercase">${h}</th>`);
            document.getElementById("thead").innerHTML = headHtml + "</tr>";
            resetAndRender();
            document.getElementById("loading").classList.add("hidden");
            document.getElementById("loading").classList.remove("flex");
        });
    }

    function renderTable() {
        let search = document.getElementById("search").value.toUpperCase();
        filteredData = allData.slice(1).filter(row => row.join(" ").toUpperCase().includes(search));
        let bodyHtml = "";
        filteredData.forEach(row => {
            bodyHtml += `<tr class="hover:bg-pea/5 border-b">`;
            row.forEach((cell, idx) => {
                let highlight = "";
                if (currentFileId === "1PKMVSFCgBwU42JRLWflpJa89zG2EtZ0l43FSuDppfhY") {
                    if(idx == 4 || idx == 5) highlight = "bg-blue-50 text-blue-700 font-medium";
                    if(idx == 6 || idx == 7) highlight = "bg-amber-50 text-amber-700 font-medium";
                    if(idx == 8 || idx == 9) highlight = "bg-rose-50 text-rose-700 font-medium";
                }
                bodyHtml += `<td class="px-6 py-3 whitespace-nowrap ${highlight}">${cell}</td>`;
            });
            bodyHtml += "</tr>";
        });
        document.getElementById("tbody").innerHTML = bodyHtml;
    }

    function openSummaryModal() {
        document.getElementById("summaryModal").classList.remove("hidden");
        document.getElementById("summaryModal").classList.add("flex");
        let counts = {};
        filteredData.forEach(row => { let name = row[0] || "ว่าง"; counts[name] = (counts[name] || 0) + 1; });
        let sorted = Object.entries(counts).sort((a,b) => b[1]-a[1]);
        let listHtml = sorted.map(([name, count]) => `<div class="flex justify-between p-4 border rounded-2xl mb-2 bg-white shadow-sm"><div class="font-bold text-slate-700">${name}</div><div class="font-black text-pea text-lg">${count}</div></div>`).join('');
        document.getElementById("summaryModalBody").innerHTML = `<div class="flex flex-col md:flex-row gap-8 items-start"><div class="w-full md:w-5/12 bg-slate-50 p-6 rounded-[2rem] border"><div class="w-full h-[300px]"><canvas id="myChart"></canvas></div></div><div class="w-full md:w-7/12">${listHtml}</div></div>`;
        setTimeout(() => {
            let ctx = document.getElementById('myChart').getContext('2d');
            myChart = new Chart(ctx, { type: 'doughnut', data: { labels: sorted.map(x=>x[0]), datasets: [{ data: sorted.map(x=>x[1]), backgroundColor: ['#74045f','#f59e0b','#9d2884','#0ea5e9','#10b981'] }] }, options: { responsive: true, maintainAspectRatio: false, cutout: '70%', plugins: { legend: { display: false } } } });
        }, 100);
        setTimeout(() => { document.getElementById("summaryModalContent").classList.add("opacity-100", "scale-100"); document.getElementById("summaryModal").classList.add("opacity-100"); }, 10);
    }
    function closeSummaryModal() { document.getElementById("summaryModalContent").classList.remove("opacity-100", "scale-100"); document.getElementById("summaryModal").classList.remove("opacity-100"); setTimeout(() => document.getElementById("summaryModal").classList.add("hidden"), 300); }
    function exportToExcel() { let wb = XLSX.utils.book_new(); let ws = XLSX.utils.aoa_to_sheet([allData[0], ...filteredData]); XLSX.utils.book_append_sheet(wb, ws, "Data"); XLSX.writeFile(wb, "GISC3_Export.xlsx"); }
    function resetAndRender() { currentPage = 1; renderTable(); }
    function toggleSidebar() { const sb = document.getElementById('sidebar'); sb.classList.toggle('w-64'); sb.classList.toggle('w-0'); }
</script>
</body>
</html>
